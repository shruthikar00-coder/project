 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        div{
            border: solid blue;
            height:500px;
            width:400px;
            background-color: pink;

    <form>
        <div>
