<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        nav{
            text-align: center;
            justify-content: flex-end;
            display: flex;
            padding: 20px;
            gap:15px;
        }
        nav a{
            text-decoration: none;
            color: black;
            font-size: 15px;
        }
        .main{
             display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 120px;
        }
        .main img{
            margin-bottom: 25px;
        }
        input {
      width: 500px;
      padding: 12px 20px;
      border-radius: 25px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
    }
    .buttons {
      margin-top: 25px;
    }
     button {
      padding: 10px 20px;
      margin: 0 8px;
      border: none;
      border-radius: 4px;
      background-color: #f8f9fa;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      border: 1px solid #ccc;
    }
        footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #f2f2f2;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
    }

    footer a {
      text-decoration: none;
      color: #70757a;
      margin-right: 15px;
      font-size: 14px;
    }

    </style>
</head>
<body>
    <div>
        <nav>
            <ul>
                <li>
                    <a href="#">About</a>
                    <a href="#">Store</a>
                    <a href="#">Gmail</a>
                    <a href="#">Image</a>
                </li>
            </ul>
        </nav>
        <div class="main">
        <img src="https://static.vecteezy.com/system/resources/previews/010/930/001/original/google-logo-icon-illustration-free-vector.jpg" width="275">
        <input type="text"><br>
        <div class="button">
        <button>search</button>
        <button>i'm feeling lucky</button><br>
        </div>
        </div>
        <footer>
            <div>
                    <a href="#">Advertising</a>
                    <a href="#">Business</a>
                    <a href="#">how search works</a>
            </div>
                    <div>
                    <a href="#">Privacy</a>
                    <a href="#">Terms</a>
                    <a href="#">Settings</a>
                    </div>
        </footer>

    </div>

</body>
</html>
