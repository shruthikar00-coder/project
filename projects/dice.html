<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: aqua;
            text-align: center;
            margin-top: 10px;
        }
        .dice{
            font-size: 50px;
            margin-top: 10px;
        }
        button{
            border-radius: 10px;
            border: none;
            padding: 10px;
            background-color: green;
            cursor: pointer;
            
        }
        button:hover{
            background-color: green;
        }
    </style>
</head>
<body>
    <h1>Dice Roller</h1>
    <div class="dice" id="dice">⚀</div>
    <button onclick="rolldice()">rolldice</button>
    <script>
        function rolldice(){
            let randomNumber=Math.floor(Math.random()*6)+1;
             let dicefaces = ["⚀","⚁","⚂","⚃","⚄","⚅"];
            document.getElementById("dice").innerText=dicefaces[randomNumber-1];
        }
    </script>
</body>
</html>
