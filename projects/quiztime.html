<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
             height: 100vh;
             /* width: 600px; */
            background-color: rgb(238, 232, 219);
            text-align: center;
            border:2px solid black;
        justify-content: center;
    
        }
        h1{
         background-color: blue;
          height:50px; 
          margin-top: 0;
        }
        h2{
           display: inline-block;
            font-size: 35px;
            font-weight: bold;
            border-bottom: 2px solid grey;
            padding-bottom: 10px;
        }
        button{
    border: 2px solid black;
    font-size: 20px;        
    padding: 15px;      
    border-radius: 10px;
    border-bottom: 3px solid grey;
    }
        #result{
            font-size: 45px;
        }
    </style>
</head>
<body>
    <h1>QUIZ TIME</h1>
    <div id="result"></div>
 <h2>What is the Capital of France?</h2><br>
 <button onclick="CheckAnswer(`Berlin`)">Berlin</button><br><br>
  <button onclick="CheckAnswer(`Madrid`)">Madrid</button><br><br>
   <button onclick="CheckAnswer(`Paris`)">Paris</button><br><br>
    <button onclick="CheckAnswer(`Rome`)">Rome</button><br><br>
<script>
    function CheckAnswer(Answer){
        let correctAnswer = "Paris";

        if(Answer === correctAnswer){
            document.getElementById("result").innerHTML = "Correct ✅";
        } else {
            document.getElementById("result").innerHTML = "Incorrect ❌";
        }
    }
</script>
</body>
</html>
